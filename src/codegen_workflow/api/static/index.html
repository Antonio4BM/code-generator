<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Code Generator</title>
    <style>
      :root {
        --bg: #0f1419;
        --panel: #1a222c;
        --text: #e7ecf1;
        --muted: #8b9aab;
        --accent: #3d9a78;
        --border: #2a3542;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 10% -10%, #1d3a32 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #243048 0%, transparent 50%),
          var(--bg);
        color: var(--text);
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 1.25rem 4rem;
      }
      h1 {
        font-family: "IBM Plex Serif", Georgia, serif;
        font-weight: 600;
        font-size: clamp(2rem, 4vw, 2.75rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      .lede {
        color: var(--muted);
        margin: 0 0 2rem;
        max-width: 36rem;
        line-height: 1.5;
      }
      .composer {
        display: grid;
        gap: 0.75rem;
      }
      .composer[hidden] {
        display: none;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        resize: vertical;
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
        line-height: 1.45;
      }
      button {
        justify-self: start;
        border: 0;
        border-radius: 8px;
        padding: 0.7rem 1.2rem;
        background: var(--accent);
        color: #04130e;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.55; cursor: wait; }
      .status {
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .assistant {
        margin-top: 1rem;
        padding: 1.1rem 1.2rem;
        border-left: 3px solid var(--accent);
        background: rgba(26, 34, 44, 0.85);
        white-space: pre-wrap;
        line-height: 1.5;
      }
      details {
        margin-top: 1.25rem;
        border-top: 1px solid var(--border);
        padding-top: 1rem;
      }
      summary {
        cursor: pointer;
        color: var(--muted);
      }
      .gate-banner {
        margin: 0 0 1rem;
        color: var(--text);
        font-size: 0.95rem;
        line-height: 1.45;
      }
      .assistant a {
        color: var(--accent);
      }
      .review pre {
        overflow: auto;
        background: #12181f;
        padding: 0.85rem;
        border-radius: 8px;
        font-size: 0.85rem;
      }
      .file-panel {
        margin: 1rem 0;
        display: grid;
        gap: 0.75rem;
      }
      .file-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #12181f;
        max-height: 220px;
        overflow: auto;
      }
      .file-list li { margin: 0; }
      .file-list button {
        width: 100%;
        justify-self: stretch;
        text-align: left;
        border: 0;
        border-radius: 0;
        border-bottom: 1px solid var(--border);
        background: transparent;
        color: var(--accent);
        font: inherit;
        font-weight: 500;
        padding: 0.55rem 0.75rem;
        cursor: pointer;
      }
      .file-list button:hover { background: rgba(61, 154, 120, 0.12); }
      .file-list button.active { background: rgba(61, 154, 120, 0.22); }
      .file-list button:last-child { border-bottom: 0; }
      .file-meta {
        color: var(--muted);
        font-size: 0.85rem;
        margin: 0;
      }
      #file-content {
        min-height: 8rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .decision-panel {
        display: grid;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .decision-panel label {
        display: grid;
        gap: 0.35rem;
      }
      .decision-panel label[hidden] {
        display: none;
      }
      .decision-panel select,
      .decision-panel textarea {
        width: 100%;
      }
      .decision-panel select:disabled,
      .decision-panel textarea:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      .pending-tag {
        display: none;
        align-items: center;
        gap: 0.5rem;
        justify-self: start;
        margin: 0;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: rgba(61, 154, 120, 0.18);
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .pending-tag[aria-hidden="false"] {
        display: inline-flex;
      }
      .pending-tag::before {
        content: "";
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1); }
      }
      .page-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem 1rem;
        margin-bottom: 0.5rem;
      }
      .page-header h1 { margin: 0; }
      .tour-launch {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        font-weight: 500;
        padding: 0.45rem 0.85rem;
        font-size: 0.9rem;
      }
      .tour-launch:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .tour-launch:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #start-review-tour {
        margin: 0 0 1rem;
      }
      .tour-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(4, 10, 16, 0.72);
      }
      .tour-overlay[hidden] { display: none; }
      .tour-target {
        position: relative;
        z-index: 1001;
        outline: 2px solid var(--accent);
        outline-offset: 6px;
        border-radius: 10px;
        box-shadow: 0 0 0 6px rgba(61, 154, 120, 0.2);
        transition: outline-offset 0.15s ease, box-shadow 0.15s ease;
      }
      .tour-dialog {
        position: fixed;
        z-index: 1002;
        width: min(360px, calc(100vw - 32px));
        max-width: 380px;
        padding: 1rem 1.1rem 1.1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      }
      .tour-dialog[hidden] { display: none; }
      .tour-progress {
        margin: 0 0 0.45rem;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .tour-dialog h2 {
        margin: 0 0 0.5rem;
        font-family: "IBM Plex Serif", Georgia, serif;
        font-size: 1.15rem;
        font-weight: 600;
      }
      .tour-dialog p {
        margin: 0 0 1rem;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.45;
      }
      .tour-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: flex-end;
      }
      .tour-actions button {
        justify-self: auto;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        font-weight: 500;
        padding: 0.45rem 0.8rem;
        font-size: 0.9rem;
      }
      .tour-actions button.primary {
        background: var(--accent);
        color: #04130e;
        border-color: var(--accent);
        font-weight: 600;
      }
      .tour-actions button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      @media (prefers-reduced-motion: reduce) {
        .tour-target {
          transition: none;
        }
        .pending-tag::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="page-header">
        <h1>Code Generator</h1>
        <button type="button" class="tour-launch" id="start-tour">
          How to use this page
        </button>
      </div>
      <p class="lede">
        Describe the software you want. One ticket becomes one workflow result —
        not a multi-agent chat transcript.
      </p>
      <form class="composer" id="ticket-form">
        <textarea
          id="ticket"
          name="ticket"
          maxlength="20000"
          required
          placeholder="Build a small Python CLI that greets the user by name..."
        ></textarea>
        <button type="submit" id="submit">Submit ticket</button>
      </form>
      <p class="status" id="status" aria-live="polite"></p>
      <div class="assistant" id="assistant" hidden></div>
      <details class="review" id="review" hidden>
        <summary>Human review controls</summary>
        <p class="gate-banner" id="gate-banner"></p>
        <button type="button" class="tour-launch" id="start-review-tour" hidden>
          Guide me through the review
        </button>
        <div class="file-panel" id="file-panel">
          <p class="file-meta" id="file-meta">Generated files</p>
          <ul class="file-list" id="file-list"></ul>
          <pre id="file-content">Select a file to preview.</pre>
        </div>
        <div class="decision-panel" id="decision-panel">
          <label>
            Decision
            <select id="decision">
              <option value="approve">approve</option>
              <option value="request_changes">request_changes</option>
              <option value="replan">replan</option>
              <option value="abort">abort</option>
            </select>
          </label>
          <label id="feedback-label">
            Feedback
            <textarea id="feedback" placeholder="Required for request_changes / replan"></textarea>
          </label>
          <p class="pending-tag" id="pending-tag" aria-hidden="true">Submitting decision…</p>
          <button type="button" id="decide">Submit decision</button>
        </div>
      </details>
    </main>
    <div class="tour-overlay" id="tour-overlay" hidden></div>
    <div
      class="tour-dialog"
      id="tour-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="tour-title"
      aria-describedby="tour-description"
      hidden
    >
      <p class="tour-progress" id="tour-progress"></p>
      <h2 id="tour-title"></h2>
      <p id="tour-description"></p>
      <div class="tour-actions">
        <button type="button" id="tour-back">Back</button>
        <button type="button" id="tour-skip">Skip</button>
        <button type="button" class="primary" id="tour-next">Next</button>
      </div>
    </div>
    <script>
      const form = document.getElementById("ticket-form");
      const statusEl = document.getElementById("status");
      const assistant = document.getElementById("assistant");
      const review = document.getElementById("review");
      const fileListEl = document.getElementById("file-list");
      const fileContentEl = document.getElementById("file-content");
      const fileMetaEl = document.getElementById("file-meta");
      const decisionEl = document.getElementById("decision");
      const feedbackEl = document.getElementById("feedback");
      const feedbackLabel = document.getElementById("feedback-label");
      const decideBtn = document.getElementById("decide");
      const pendingTag = document.getElementById("pending-tag");
      const gateBanner = document.getElementById("gate-banner");
      const startTourBtn = document.getElementById("start-tour");
      const startReviewTourBtn = document.getElementById("start-review-tour");
      const tourOverlay = document.getElementById("tour-overlay");
      const tourDialog = document.getElementById("tour-dialog");
      const tourProgress = document.getElementById("tour-progress");
      const tourTitle = document.getElementById("tour-title");
      const tourDescription = document.getElementById("tour-description");
      const tourBack = document.getElementById("tour-back");
      const tourNext = document.getElementById("tour-next");
      const tourSkip = document.getElementById("tour-skip");
      let workflowId = null;
      let decisionPending = false;

      const submissionTourSteps = [
        {
          target: "#ticket",
          title: "Describe your project",
          description:
            "Explain what the application should do. Include required features, preferred technology, important constraints, tests, and expected documentation.",
        },
        {
          target: "#submit",
          title: "Start the workflow",
          description:
            "Submit the ticket to start planning, code generation, automated verification, and review.",
        },
        {
          target: "#status",
          title: "Follow the progress",
          description:
            "This area shows whether the workflow is planning, coding, verifying, reviewing, waiting for your decision, or completed.",
        },
      ];

      const reviewTourSteps = [
        {
          target: "#review",
          title: "Human review controls",
          description:
            "The workflow pauses here after automated verification so you can inspect the generated project and decide what should happen next.",
        },
        {
          target: "#file-panel",
          title: "What the file panel is for",
          description:
            "This panel lists every file generated for your project. Use it to browse the result: pick a file on the left, then read its contents in the preview below before you approve or send it back.",
        },
        {
          target: "#file-list",
          title: "Select a file",
          description:
            "Click any file name in this list to open it. The highlighted row is the file currently shown in the preview.",
        },
        {
          target: "#file-content",
          title: "Preview the source",
          description:
            "This is the contents of the selected file. Check that the implementation matches your original ticket before choosing a decision.",
        },
        {
          target: "#decision",
          title: "What the decisions are for",
          description:
            "approve packages the project so you can download the ZIP. request_changes sends the project back for code fixes (feedback required). replan rebuilds the plan when structure or architecture should change (feedback required). abort stops the workflow.",
        },
        {
          target: "#decide",
          title: "Submit your decision",
          description:
            "After you choose a decision—and add feedback if you picked request_changes or replan—click here to resume the workflow.",
        },
      ];

      let activeTour = [];
      let activeTourIndex = 0;
      let activeTarget = null;
      let previouslyFocusedElement = null;
      let tourIsActive = false;

      function prefersReducedMotion() {
        return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }

      function isElementAvailable(el) {
        if (!el) return false;
        let node = el;
        while (node) {
          if (node.hidden || (node.hasAttribute && node.hasAttribute("hidden"))) {
            return false;
          }
          if (
            node !== el &&
            node.tagName === "DETAILS" &&
            !node.open
          ) {
            return false;
          }
          node = node.parentElement;
        }
        return true;
      }

      function resolveTourStep(step) {
        if (!step || !step.target) return null;
        const el = document.querySelector(step.target);
        if (!isElementAvailable(el)) return null;
        return el;
      }

      function findValidTourIndex(fromIndex, direction) {
        const step = direction >= 0 ? 1 : -1;
        let index = fromIndex;
        while (index >= 0 && index < activeTour.length) {
          if (resolveTourStep(activeTour[index])) return index;
          index += step;
        }
        return -1;
      }

      function clearTourTarget() {
        if (activeTarget) {
          activeTarget.classList.remove("tour-target");
          activeTarget = null;
        }
      }

      function getTourFocusableButtons() {
        return [tourBack, tourSkip, tourNext].filter(
          (btn) => !btn.hidden && !btn.disabled && btn.offsetParent !== null
        );
      }

      function positionTourDialog() {
        if (!tourIsActive || !activeTarget) return;

        const margin = 16;
        const gap = 12;
        const rect = activeTarget.getBoundingClientRect();
        const dialogRect = tourDialog.getBoundingClientRect();
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const spaceBelow = viewportHeight - rect.bottom - margin;
        const spaceAbove = rect.top - margin;

        let top;
        const preferBelow = spaceBelow >= dialogRect.height + gap;
        const preferAbove = spaceAbove >= dialogRect.height + gap;

        if (preferBelow) {
          top = rect.bottom + gap;
        } else if (preferAbove) {
          top = rect.top - dialogRect.height - gap;
        } else if (spaceBelow >= spaceAbove) {
          top = Math.min(rect.bottom + gap, viewportHeight - dialogRect.height - margin);
        } else {
          top = Math.max(margin, rect.top - dialogRect.height - gap);
        }

        if (
          top < margin ||
          top + dialogRect.height > viewportHeight - margin
        ) {
          top = Math.max(
            margin,
            viewportHeight - dialogRect.height - margin
          );
        }

        let left = rect.left + rect.width / 2 - dialogRect.width / 2;
        left = Math.max(margin, Math.min(left, viewportWidth - dialogRect.width - margin));

        tourDialog.style.top = `${Math.round(top)}px`;
        tourDialog.style.left = `${Math.round(left)}px`;
      }

      function renderTourStep() {
        if (!tourIsActive || !activeTour.length) {
          finishTour(false);
          return;
        }

        const validIndex = findValidTourIndex(activeTourIndex, 1);
        if (validIndex === -1) {
          finishTour(false);
          return;
        }
        activeTourIndex = validIndex;

        const step = activeTour[activeTourIndex];
        const target = resolveTourStep(step);
        if (!target) {
          finishTour(false);
          return;
        }

        clearTourTarget();
        activeTarget = target;
        activeTarget.classList.add("tour-target");
        activeTarget.scrollIntoView({
          block: "nearest",
          inline: "nearest",
          behavior: prefersReducedMotion() ? "auto" : "smooth",
        });

        const stepNumber = activeTourIndex + 1;
        const totalSteps = activeTour.length;
        tourProgress.textContent = `Step ${stepNumber} of ${totalSteps}`;
        tourTitle.textContent = step.title;
        tourDescription.textContent = step.description;

        const isFirst = findValidTourIndex(activeTourIndex - 1, -1) === -1;
        const isLast = findValidTourIndex(activeTourIndex + 1, 1) === -1;
        tourBack.disabled = isFirst;
        tourNext.textContent = isLast ? "Finish" : "Next";

        tourOverlay.hidden = false;
        tourDialog.hidden = false;
        positionTourDialog();
        requestAnimationFrame(positionTourDialog);
        tourNext.focus();
      }

      function startTour(steps, launcher) {
        if (!steps || !steps.length) return;
        if (tourIsActive) finishTour(false);

        previouslyFocusedElement = launcher || document.activeElement;
        activeTour = steps;
        activeTourIndex = findValidTourIndex(0, 1);
        if (activeTourIndex === -1) {
          previouslyFocusedElement = null;
          return;
        }

        tourIsActive = true;
        renderTourStep();
      }

      function finishTour(markCompleted) {
        const restoreFocus = previouslyFocusedElement;
        clearTourTarget();
        tourIsActive = false;
        activeTour = [];
        activeTourIndex = 0;
        previouslyFocusedElement = null;
        tourOverlay.hidden = true;
        tourDialog.hidden = true;
        tourDialog.style.top = "";
        tourDialog.style.left = "";
        if (restoreFocus && typeof restoreFocus.focus === "function") {
          restoreFocus.focus();
        }
        void markCompleted;
      }

      function goTourNext() {
        if (!tourIsActive) return;
        const nextIndex = findValidTourIndex(activeTourIndex + 1, 1);
        if (nextIndex === -1) {
          finishTour(true);
          return;
        }
        activeTourIndex = nextIndex;
        renderTourStep();
      }

      function goTourBack() {
        if (!tourIsActive) return;
        const prevIndex = findValidTourIndex(activeTourIndex - 1, -1);
        if (prevIndex === -1) return;
        activeTourIndex = prevIndex;
        renderTourStep();
      }

      function syncReviewTourButton() {
        const available = !review.hidden;
        startReviewTourBtn.hidden = !available;
        startReviewTourBtn.disabled = !available;
      }

      startTourBtn.addEventListener("click", () => {
        startTour(submissionTourSteps, startTourBtn);
      });

      startReviewTourBtn.addEventListener("click", () => {
        if (review.hidden) return;
        review.open = true;
        startTour(reviewTourSteps, startReviewTourBtn);
      });

      tourBack.addEventListener("click", goTourBack);
      tourNext.addEventListener("click", goTourNext);
      tourSkip.addEventListener("click", () => finishTour(true));

      tourDialog.addEventListener("keydown", (event) => {
        if (!tourIsActive) return;

        if (event.key === "Escape") {
          event.preventDefault();
          finishTour(false);
          return;
        }

        if (event.key === "ArrowRight") {
          event.preventDefault();
          goTourNext();
          return;
        }

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          goTourBack();
          return;
        }

        if (event.key !== "Tab") return;

        const focusable = getTourFocusableButtons();
        if (!focusable.length) {
          event.preventDefault();
          return;
        }

        const currentIndex = focusable.indexOf(document.activeElement);
        event.preventDefault();
        if (event.shiftKey) {
          const prev =
            currentIndex <= 0 ? focusable[focusable.length - 1] : focusable[currentIndex - 1];
          prev.focus();
        } else {
          const next =
            currentIndex === -1 || currentIndex >= focusable.length - 1
              ? focusable[0]
              : focusable[currentIndex + 1];
          next.focus();
        }
      });

      window.addEventListener("resize", () => {
        if (tourIsActive) positionTourDialog();
      });

      window.addEventListener(
        "scroll",
        () => {
          if (tourIsActive) positionTourDialog();
        },
        true
      );

      syncReviewTourButton();

      function syncFeedbackField() {
        const needsFeedback =
          decisionEl.value === "request_changes" || decisionEl.value === "replan";
        feedbackLabel.hidden = !needsFeedback;
        if (!needsFeedback) {
          feedbackEl.value = "";
        }
        feedbackEl.disabled = decisionPending || !needsFeedback;
      }

      function setDecisionPending(pending, label) {
        decisionPending = pending;
        decisionEl.disabled = pending;
        decideBtn.disabled = pending;
        pendingTag.textContent = label || "Submitting decision…";
        pendingTag.setAttribute("aria-hidden", pending ? "false" : "true");
        syncFeedbackField();
      }

      decisionEl.addEventListener("change", syncFeedbackField);
      syncFeedbackField();

      function clearFilePreview(message) {
        fileListEl.innerHTML = "";
        fileContentEl.textContent = message || "Select a file to preview.";
        fileMetaEl.textContent = "Generated files";
      }

      async function loadFileTree(id) {
        clearFilePreview("Loading files…");
        const res = await fetch(`/runs/${id}/files`);
        const data = await res.json();
        if (!res.ok) {
          fileContentEl.textContent = data.message || "Could not load file tree.";
          return;
        }
        const files = data.files || [];
        fileMetaEl.textContent = `${files.length} generated file${files.length === 1 ? "" : "s"}`;
        fileListEl.innerHTML = "";
        if (!files.length) {
          fileContentEl.textContent = "No candidate files available yet.";
          return;
        }
        files.forEach((path) => {
          const li = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = path;
          button.addEventListener("click", () => openFile(id, path, button));
          li.appendChild(button);
          fileListEl.appendChild(li);
        });
        fileContentEl.textContent = "Select a file to preview.";
      }

      async function openFile(id, path, button) {
        fileListEl.querySelectorAll("button").forEach((el) => el.classList.remove("active"));
        if (button) button.classList.add("active");
        fileContentEl.textContent = `Loading ${path}…`;
        const res = await fetch(
          `/runs/${id}/files/content?path=${encodeURIComponent(path)}`
        );
        const data = await res.json();
        if (!res.ok) {
          fileContentEl.textContent = data.message || "Could not read file.";
          return;
        }
        fileMetaEl.textContent = `${data.path} · ${data.size_bytes} bytes`;
        fileContentEl.textContent = data.content;
      }

      function gateCopy(interrupt) {
        const gate = interrupt && interrupt.gate;
        if (gate === "reviewer") {
          return (
            "Automated review is done. Inspect the files, then approve to " +
            "download the ZIP, or request changes / replan."
          );
        }
        return "Approve, request changes, replan, or abort the paused workflow.";
      }

      function renderAssistant(data) {
        assistant.hidden = false;
        assistant.replaceChildren();
        const message = document.createElement("div");
        message.textContent = data.message || "";
        assistant.appendChild(message);
        if (data.artifact_url) {
          const link = document.createElement("a");
          link.href = data.artifact_url;
          link.textContent = "Download project ZIP";
          link.style.display = "inline-block";
          link.style.marginTop = "0.75rem";
          assistant.appendChild(link);
        }
      }

      function showResult(data) {
        workflowId = data.workflow_id;
        statusEl.textContent = `Status: ${data.status}`;
        renderAssistant(data);
        if (data.interrupt) {
          form.hidden = true;
          review.hidden = false;
          review.open = true;
          gateBanner.textContent = gateCopy(data.interrupt);
          loadFileTree(data.workflow_id);
        } else {
          form.hidden = false;
          review.hidden = true;
          gateBanner.textContent = "";
          clearFilePreview();
        }
        syncReviewTourButton();
        if (tourIsActive) renderTourStep();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = document.getElementById("submit");
        button.disabled = true;
        statusEl.textContent = "Starting workflow…";
        try {
          const res = await fetch("/run-ticket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ticket: document.getElementById("ticket").value }),
          });
          const data = await res.json();
          if (!res.ok) {
            statusEl.textContent = data.message || "Request failed";
            assistant.hidden = false;
            assistant.textContent = data.message || "Request failed";
            return;
          }
          showResult(data);
        } catch (err) {
          statusEl.textContent = "Network error";
        } finally {
          button.disabled = false;
        }
      });

      decideBtn.addEventListener("click", async () => {
        if (!workflowId || decisionPending) return;
        const decision = decisionEl.value;
        const needsFeedback =
          decision === "request_changes" || decision === "replan";
        if (needsFeedback && !feedbackEl.value.trim()) {
          statusEl.textContent = "Feedback is required for this decision.";
          return;
        }
        const pendingLabels = {
          request_changes: "Requesting changes…",
          replan: "Replanning…",
          approve: "Approving…",
          abort: "Aborting…",
        };
        setDecisionPending(true, pendingLabels[decision] || "Submitting decision…");
        statusEl.textContent = `Status: submitting ${decision}…`;
        try {
          const res = await fetch(`/runs/${workflowId}/decision`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              decision,
              feedback: needsFeedback ? feedbackEl.value : "",
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            statusEl.textContent = data.message || "Decision failed";
            setDecisionPending(false);
            return;
          }
          setDecisionPending(false);
          showResult(data);
        } catch (err) {
          statusEl.textContent = "Network error";
          setDecisionPending(false);
        }
      });
    </script>
  </body>
</html>
