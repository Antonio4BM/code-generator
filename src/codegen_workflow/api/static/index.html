<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Code Generator</title>
    <style>
      :root {
        --bg: #0f1419;
        --panel: #1a222c;
        --text: #e7ecf1;
        --muted: #8b9aab;
        --accent: #3d9a78;
        --border: #2a3542;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 10% -10%, #1d3a32 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #243048 0%, transparent 50%),
          var(--bg);
        color: var(--text);
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 1.25rem 4rem;
      }
      h1 {
        font-family: "IBM Plex Serif", Georgia, serif;
        font-weight: 600;
        font-size: clamp(2rem, 4vw, 2.75rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      .lede {
        color: var(--muted);
        margin: 0 0 2rem;
        max-width: 36rem;
        line-height: 1.5;
      }
      .composer {
        display: grid;
        gap: 0.75rem;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        resize: vertical;
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
        line-height: 1.45;
      }
      button {
        justify-self: start;
        border: 0;
        border-radius: 8px;
        padding: 0.7rem 1.2rem;
        background: var(--accent);
        color: #04130e;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.55; cursor: wait; }
      .status {
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .assistant {
        margin-top: 1rem;
        padding: 1.1rem 1.2rem;
        border-left: 3px solid var(--accent);
        background: rgba(26, 34, 44, 0.85);
        white-space: pre-wrap;
        line-height: 1.5;
      }
      details {
        margin-top: 1.25rem;
        border-top: 1px solid var(--border);
        padding-top: 1rem;
      }
      summary {
        cursor: pointer;
        color: var(--muted);
      }
      .review pre {
        overflow: auto;
        background: #12181f;
        padding: 0.85rem;
        border-radius: 8px;
        font-size: 0.85rem;
      }
      .file-panel {
        margin: 1rem 0;
        display: grid;
        gap: 0.75rem;
      }
      .file-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #12181f;
        max-height: 220px;
        overflow: auto;
      }
      .file-list li { margin: 0; }
      .file-list button {
        width: 100%;
        justify-self: stretch;
        text-align: left;
        border: 0;
        border-radius: 0;
        border-bottom: 1px solid var(--border);
        background: transparent;
        color: var(--accent);
        font: inherit;
        font-weight: 500;
        padding: 0.55rem 0.75rem;
        cursor: pointer;
      }
      .file-list button:hover { background: rgba(61, 154, 120, 0.12); }
      .file-list button.active { background: rgba(61, 154, 120, 0.22); }
      .file-list button:last-child { border-bottom: 0; }
      .file-meta {
        color: var(--muted);
        font-size: 0.85rem;
        margin: 0;
      }
      #file-content {
        min-height: 8rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Code Generator</h1>
      <p class="lede">
        Describe the software you want. One ticket becomes one workflow result —
        not a multi-agent chat transcript.
      </p>
      <form class="composer" id="ticket-form">
        <textarea
          id="ticket"
          name="ticket"
          maxlength="20000"
          required
          placeholder="Build a small Python CLI that greets the user by name..."
        ></textarea>
        <button type="submit" id="submit">Submit ticket</button>
      </form>
      <p class="status" id="status" aria-live="polite"></p>
      <div class="assistant" id="assistant" hidden></div>
      <details class="review" id="review" hidden>
        <summary>Human review controls</summary>
        <p class="lede">Approve, request changes, replan, or abort the paused workflow.</p>
        <div class="file-panel">
          <p class="file-meta" id="file-meta">Generated files</p>
          <ul class="file-list" id="file-list"></ul>
          <pre id="file-content">Select a file to preview.</pre>
        </div>
        <label>
          Decision
          <select id="decision">
            <option value="approve">approve</option>
            <option value="request_changes">request_changes</option>
            <option value="replan">replan</option>
            <option value="abort">abort</option>
          </select>
        </label>
        <textarea id="feedback" placeholder="Optional feedback (required for changes/replan)"></textarea>
        <button type="button" id="decide">Submit decision</button>
      </details>
    </main>
    <script>
      const form = document.getElementById("ticket-form");
      const statusEl = document.getElementById("status");
      const assistant = document.getElementById("assistant");
      const review = document.getElementById("review");
      const fileListEl = document.getElementById("file-list");
      const fileContentEl = document.getElementById("file-content");
      const fileMetaEl = document.getElementById("file-meta");
      let workflowId = null;

      function clearFilePreview(message) {
        fileListEl.innerHTML = "";
        fileContentEl.textContent = message || "Select a file to preview.";
        fileMetaEl.textContent = "Generated files";
      }

      async function loadFileTree(id) {
        clearFilePreview("Loading files…");
        const res = await fetch(`/runs/${id}/files`);
        const data = await res.json();
        if (!res.ok) {
          fileContentEl.textContent = data.message || "Could not load file tree.";
          return;
        }
        const files = data.files || [];
        fileMetaEl.textContent = `${files.length} generated file${files.length === 1 ? "" : "s"}`;
        fileListEl.innerHTML = "";
        if (!files.length) {
          fileContentEl.textContent = "No candidate files available yet.";
          return;
        }
        files.forEach((path) => {
          const li = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = path;
          button.addEventListener("click", () => openFile(id, path, button));
          li.appendChild(button);
          fileListEl.appendChild(li);
        });
        fileContentEl.textContent = "Select a file to preview.";
      }

      async function openFile(id, path, button) {
        fileListEl.querySelectorAll("button").forEach((el) => el.classList.remove("active"));
        if (button) button.classList.add("active");
        fileContentEl.textContent = `Loading ${path}…`;
        const res = await fetch(
          `/runs/${id}/files/content?path=${encodeURIComponent(path)}`
        );
        const data = await res.json();
        if (!res.ok) {
          fileContentEl.textContent = data.message || "Could not read file.";
          return;
        }
        fileMetaEl.textContent = `${data.path} · ${data.size_bytes} bytes`;
        fileContentEl.textContent = data.content;
      }

      function showResult(data) {
        workflowId = data.workflow_id;
        statusEl.textContent = `Status: ${data.status}`;
        assistant.hidden = false;
        let text = data.message || "";
        if (data.artifact_url) {
          text += `\n\nDownload: ${data.artifact_url}`;
        }
        assistant.textContent = text;
        if (data.interrupt) {
          review.hidden = false;
          loadFileTree(data.workflow_id);
        } else {
          review.hidden = true;
          clearFilePreview();
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = document.getElementById("submit");
        button.disabled = true;
        statusEl.textContent = "Starting workflow…";
        try {
          const res = await fetch("/run-ticket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ticket: document.getElementById("ticket").value }),
          });
          const data = await res.json();
          if (!res.ok) {
            statusEl.textContent = data.message || "Request failed";
            assistant.hidden = false;
            assistant.textContent = data.message || "Request failed";
            return;
          }
          showResult(data);
        } catch (err) {
          statusEl.textContent = "Network error";
        } finally {
          button.disabled = false;
        }
      });

      document.getElementById("decide").addEventListener("click", async () => {
        if (!workflowId) return;
        const res = await fetch(`/runs/${workflowId}/decision`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            decision: document.getElementById("decision").value,
            feedback: document.getElementById("feedback").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.message || "Decision failed";
          return;
        }
        showResult(data);
      });
    </script>
  </body>
</html>
